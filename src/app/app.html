<main
  class="app-root"
  *ngIf="!showSettings() && !overlayEnabled(); else altView"
>
  <button
    type="button"
    class="settings-button"
    (click)="toggleSettings()"
    aria-label="설정 열기"
  >
    ⚙︎
  </button>
  <section class="timer-container" aria-label="뽀모도로 타이머">
    <div class="duration-controls">
      <label class="field">
        <span class="field-label">집중 시간</span>
        <select
          [value]="focusSeconds()"
          (change)="updateFocusSeconds($event)"
        >
          <option
            *ngFor="let s of focusOptionsSeconds"
            [value]="s"
          >
            {{
              s < 60
                ? (s + '초 (테스트)')
                : ((s / 60) + '분')
            }}
          </option>
        </select>
      </label>

      <label class="field">
        <span class="field-label">휴게 시간</span>
        <select
          [value]="breakSeconds()"
          (change)="updateBreakSeconds($event)"
        >
          <option
            *ngFor="let s of breakOptionsSeconds"
            [value]="s"
          >
            {{
              s < 60
                ? (s + '초 (테스트)')
                : ((s / 60) + '분')
            }}
          </option>
        </select>
      </label>

      <div class="overlay-toggle-wrapper">
        <span class="overlay-label">오버레이 모드</span>
        <button
          type="button"
          class="overlay-toggle"
          [class.overlay-on]="overlayEnabled()"
          (click)="toggleOverlay()"
          [attr.aria-pressed]="overlayEnabled()"
        >
          <span class="overlay-toggle-thumb"></span>
        </button>
      </div>
    </div>

    <div class="timer-display">
      <div class="mode-label">{{ modeLabel() }}</div>
      <div class="time">{{ formattedTime() }}</div>
    </div>

    <div class="timer-controls">
      <button type="button" class="primary" (click)="toggleTimer()">
        {{ isRunning() ? '일시정지' : '시작' }}
      </button>
      <button type="button" class="secondary" (click)="reset()">
        리셋
      </button>
    </div>
  </section>
</main>

<ng-template #altView>
  <ng-container *ngIf="showSettings(); else overlayView">
    <main class="app-root">
      <section class="settings-container" aria-label="설정">
        <header class="settings-header">
          <h1>알림음 선택</h1>
        </header>

        <div class="settings-body">
          <label class="field">
            <span class="field-label">집중시간 종료 알림음</span>
            <select
              [value]="workSound()"
              (change)="updateWorkSound($event)"
            >
              <option *ngFor="let s of soundOptions" [value]="s">
                {{ s }}
              </option>
            </select>
            <button
              type="button"
              class="preview-button"
              (click)="playPreview(workSound())"
              aria-label="집중시간 알림음 미리듣기"
            >
              ▶︎
            </button>
          </label>

          <label class="field">
            <span class="field-label">휴식시간 종료 알림음</span>
            <select
              [value]="breakSound()"
              (change)="updateBreakSound($event)"
            >
              <option *ngFor="let s of soundOptions" [value]="s">
                {{ s }}
              </option>
            </select>
            <button
              type="button"
              class="preview-button"
              (click)="playPreview(breakSound())"
              aria-label="휴식시간 알림음 미리듣기"
            >
              ▶︎
            </button>
          </label>
        </div>

        <footer class="settings-footer">
          <button type="button" class="secondary" (click)="cancelSettings()">
            취소
          </button>
          <button type="button" class="primary" (click)="saveSettings()">
            확인
          </button>
        </footer>
      </section>
    </main>
  </ng-container>

  <ng-template #overlayView>
    <main class="app-root app-root--overlay">
      <section class="overlay-mini" aria-label="오버레이 타이머">
        <div class="overlay-mode-label">
          {{ modeLabel() }}
        </div>

        <div class="overlay-time">
          {{ formattedTime() }}
        </div>

        <div class="overlay-row">
          <button
            type="button"
            class="overlay-play-pause"
            (click)="toggleTimer()"
            [attr.aria-label]="isRunning() ? '일시정지' : '시작'"
          >
            <span *ngIf="!isRunning()">▶︎</span>
            <span *ngIf="isRunning()">⏸</span>
          </button>

          <div class="overlay-row-right">
            <button
              type="button"
              class="overlay-reset"
              (click)="reset()"
              aria-label="리셋"
            >
              ↺
            </button>
          </div>
        </div>

        <div class="overlay-bottom-row">
          <input
            type="range"
            min="50"
            max="100"
            step="5"
            class="overlay-opacity-range"
            [value]="overlayOpacity()"
            (input)="updateOverlayOpacity($event)"
            aria-label="투명도 조절"
          />

          <button
            type="button"
            class="overlay-exit"
            (click)="toggleOverlay()"
            aria-label="크게 보기"
          >
            ⤢
          </button>
        </div>
      </section>
    </main>
  </ng-template>
</ng-template>
