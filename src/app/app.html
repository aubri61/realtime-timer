<main class="app-root">
  <section class="timer-container" aria-label="뽀모도로 타이머">
    <div class="duration-controls">
      <label class="field">
        <span class="field-label">집중 시간</span>
        <select
          [value]="focusMinutes()"
          (change)="updateFocusMinutes($event)"
        >
          <option
            *ngFor="let m of focusOptions"
            [value]="m"
          >
            {{ m }}분
          </option>
        </select>
      </label>

      <label class="field">
        <span class="field-label">휴게 시간</span>
        <select
          [value]="breakMinutes()"
          (change)="updateBreakMinutes($event)"
        >
          <option
            *ngFor="let m of breakOptions"
            [value]="m"
          >
            {{ m }}분
          </option>
        </select>
      </label>

      <button type="button" class="overlay" (click)="toggleOverlay()">
        오버레이
      </button>
    </div>

    <div class="timer-display">
      <div class="mode-label">{{ modeLabel() }}</div>
      <div class="time">{{ formattedTime() }}</div>
    </div>

    <div class="timer-controls">
      <button type="button" class="primary" (click)="toggleTimer()">
        {{ isRunning() ? '일시정지' : '시작' }}
      </button>
      <button type="button" class="secondary" (click)="reset()">
        리셋
      </button>
    </div>
  </section>
</main>
